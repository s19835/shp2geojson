<style>
/*
 * shp2geojson — Custom rustdoc theme
 * Light mode with accent colours from the CLI mockup
 */

/* Force light base */
:root { color-scheme: light !important; }

body, body.rustdoc {
    background-color: #fafbfe !important;
    color: #2d3142 !important;
}

/* Widen main content area, centre it */
.width-limiter {
    max-width: 960px !important;
    margin: 0 auto !important;
    padding: 0 32px !important;
}
main { padding-top: 16px !important; }
#main-content { max-width: 100% !important; }

/* Sidebar */
nav.sidebar {
    background: #f0f1f8 !important;
    border-right: 1px solid #dfe2ef !important;
}
.sidebar .sidebar-crate h2 a {
    color: #ff7c5c !important;
    font-weight: 700 !important;
}
.sidebar .sidebar-crate .version { color: #8b90a8 !important; }
nav.sidebar a { color: #5b5f7a !important; }
nav.sidebar a:hover, nav.sidebar a.current {
    color: #ff7c5c !important;
    background: #fff0ec !important;
}
.sidebar h3, .sidebar-elems h3 {
    color: #a78bfa !important;
    font-size: 11px !important;
    letter-spacing: 0.12em !important;
    text-transform: uppercase !important;
}
#rustdoc-toc a { color: #5b5f7a !important; }
#rustdoc-toc a:hover { color: #ff7c5c !important; }

/* Top bar */
rustdoc-topbar, .rustdoc-topbar {
    background: #ffffff !important;
    border-bottom: 1px solid #e8e9f0 !important;
}
rustdoc-topbar h2 a { color: #ff7c5c !important; }

/* Headings */
.main-heading h1, h1.fqn {
    color: #ff7c5c !important;
    font-weight: 700 !important;
    border-bottom: 2px solid #ffe0d6 !important;
    padding-bottom: 8px !important;
}
h2, h3, h4, h5, h6 { color: #2d3142 !important; }
.section-header a, h2 a, h3 a { color: #2d3142 !important; }

/* Section headings in all-items page */
#main-content > h3 {
    color: #a78bfa !important;
    font-size: 13px !important;
    letter-spacing: 0.1em !important;
    text-transform: uppercase !important;
    border-bottom: 1px solid #e8e9f0 !important;
    padding-bottom: 6px !important;
    margin-top: 24px !important;
}

/* Links */
a { color: #4ecdc4 !important; }
a:hover { color: #ff7c5c !important; }
.all-items a, ul.all-items a {
    color: #5b8fff !important;
    text-decoration: none !important;
}
.all-items a:hover {
    color: #ff7c5c !important;
    text-decoration: underline !important;
}

/* Code blocks */
pre, .rust {
    background: #f5f6fb !important;
    color: #2d3142 !important;
    border: 1px solid #e8e9f0 !important;
    border-radius: 6px !important;
}
code {
    background: #f5f6fb !important;
    color: #2d3142 !important;
    padding: 1px 5px !important;
    border-radius: 4px !important;
    font-size: 0.92em !important;
}
pre code { padding: 0 !important; background: transparent !important; }
pre.rust { padding: 14px 18px !important; }

/* Syntax highlights */
pre .kw, .code-header .kw { color: #a78bfa !important; }
pre .kw-2, .code-header .kw-2 { color: #ff7c5c !important; }
pre .string, .code-header .string { color: #56d18a !important; }
pre .number, .code-header .number { color: #ff7c5c !important; }
pre .comment, .code-header .comment { color: #8b90a8 !important; }
pre .macro, .code-header .macro { color: #5b8fff !important; }
pre .type, pre .self { color: #4ecdc4 !important; }

/* Item declarations */
.item-decl pre {
    background: #ffffff !important;
    border: 1px solid #e8e9f0 !important;
    border-left: 3px solid #ff7c5c !important;
    border-radius: 0 6px 6px 0 !important;
    padding: 14px 18px !important;
}

/* Docblock */
.docblock { color: #3d4059 !important; line-height: 1.65 !important; }

/* Search box */
.search-input, #search-input {
    background: #ffffff !important;
    border: 1px solid #dfe2ef !important;
    border-radius: 8px !important;
    color: #2d3142 !important;
}

/* Module list items */
ul.all-items li { padding: 4px 0 !important; }

::-webkit-scrollbar-thumb { background: #c8cade; border-radius: 4px; }

/* Source view sidebar */
.src .sidebar { background: #f0f1f8 !important; }

/* Mobile */
@media (max-width: 700px) {
    .width-limiter { padding: 0 16px !important; }
}
</style>
